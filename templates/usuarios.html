<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Clientes | BCTA</title>
    <style>
        :root {
            --azul: #0a192f;
            --dorado: #c5a059;
            --gris: #f5f7fa;
            --blanco: #ffffff;
            --texto: #334155;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: var(--gris);
            color: var(--texto);
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 700px;
            background: var(--blanco);
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
            border-top: 5px solid var(--dorado);
            padding: 40px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--azul);
            font-size: 2rem;
        }

        p {
            line-height: 1.7;
            margin-bottom: 16px;
        }

        .estado {
            margin: 25px 0;
            padding: 16px;
            border-radius: 8px;
            background: #eef2f7;
            color: #2563eb;
            font-weight: 700;
        }

        .acciones {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            padding: 14px 22px;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.25s ease;
        }

        .btn:hover {
            background: var(--dorado);
            color: var(--azul);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Portal de Clientes</h1>

            <p>
                Aquí los usuarios podrán crear su cuenta, ingresar su caso,
                adjuntar antecedentes y hacer seguimiento de su solicitud.
            </p>

            <p>
                Esta pantalla será la base del futuro acceso de clientes del estudio.
            </p>

            <div class="estado">
                ESTADO: módulo en construcción
            </div>

            <div class="acciones">
                <a class="btn" href="/home">← Volver al inicio</a>
                <a class="btn" href="/salir">Cerrar acceso</a>
            </div>
        </div>
    </div>
</body>
</html>
